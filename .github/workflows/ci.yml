name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Inject Appwrite config
        run: |
          cat > local.properties <<EOF
          sdk.dir=$ANDROID_SDK_ROOT
          APPWRITE_PROJECT_ID=${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_PROJECT_NAME=${{ secrets.APPWRITE_PROJECT_NAME }}
          APPWRITE_PUBLIC_ENDPOINT=${{ secrets.APPWRITE_PUBLIC_ENDPOINT }}
          EOF

      - name: Assemble debug
        run: ./gradlew :app:assembleDebug --no-daemon
